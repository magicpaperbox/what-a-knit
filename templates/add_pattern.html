{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2>✨ New project</h2>
    <form method="POST" action="/add">
        <div class="form-group">
            <label for="name">Pattern name:</label>
            <input type="text" id="name" name="name" placeholder="e.g. Monday sweater">
        </div>
        <div class="form-group">
            <label for="type">Category:</label>
            <input type="text" id="type" name="type" placeholder="e.g. sweater, hat, socks">
        </div>
        <div class="form-group">
            <label for="subtype">Subcategory:</label>
            <input type="text" id="subtype" name="subtype" placeholder="e.g. raglan, heel flap">
        </div>
        <div class="form-group">
            <label for="notes">Notes:</label>
            <input type="text" id="notes" name="notes" placeholder="Any extra notes...">
        </div>
        <button type="submit" class="btn-submit">🧶 Add project</button>
    </form>
</div>
{% endblock %}
