{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2><img src="/static/icons/needles.png" class="icon-header" alt="Needle"> Edit pattern</h2>

    <form method="POST" action="/patterns/{{ pattern.id.value }}/edit">

        <div class="form-group">
            <label for="name">Pattern name:</label>
            <input type="text" id="name" name="name" value="{{ pattern.name }}" required>
        </div>

        <!-- SELECT CATEGORY -->
        <div class="form-group">
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="" disabled hidden>select</option>
                {% for category in pattern_categories %}
                <option value="{{ category.name }}" {% if pattern.category==category %}selected{% endif %}>
                    {{ category.value }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- SELECT SUBCATEGORY -->
        <!-- data-selected lets JS know which subcategory to pre-select -->
        <div class="form-group">
            <label for="subcategory">Subcategory:</label>
            <select id="subcategory" name="subcategory" data-selected="{{ pattern.subcategory }}">
                <option value="" disabled selected hidden>select category first</option>
                <option value="{{ pattern.subcategory }}" selected>{{ pattern.subcategory }}</option>
            </select>
            <script>
                const subcategories = {{ subcategories_map | tojson }};
            </script>
        </div>

        <!-- SELECT TOOLS -->
        <div class="form-group">
            <label for="tool">Tool:</label>
            <select id="tool" name="tool" required>
                <option value="" disabled hidden>select</option>
                <option value="knitting needles" {% if pattern.tool=='knitting needles' %}selected{% endif %}>knitting
                    needles</option>
                <option value="crochet hook" {% if pattern.tool=='crochet hook' %}selected{% endif %}>crochet hook
                </option>
            </select>
        </div>

        <!-- SELECT TOOL SIZE -->
        <div class="form-group">
            <label for="needle_size">Needle/hook size (mm):</label>
            <input type="number" id="needle_size" name="needle_size" min="0" max="25" step="0.05"
                value="{{ pattern.needle_size }}" placeholder="choose size between 0 and 25 mm">
        </div>

        <!-- SELECT YARN TYPE -->
        <div class="form-group">
            <label for="skeins">Yarn name:</label>
            <input type="text" id="skeins" name="skeins" value="{{ pattern.skeins or '' }}"
                placeholder="e.g. Drops Alpaca">
        </div>

        <!-- SELECT YARN AMOUNT -->
        <div class="form-group">
            <label for="skeins_needed">Skeins needed:</label>
            <input type="number" id="skeins_needed" name="skeins_needed" min="0"
                value="{{ pattern.skeins_needed or '' }}" placeholder="0">
        </div>

        <!-- SELECT HAS PATTERN -->
        {% set has_pattern = 'yes' if (pattern.pattern_language or pattern.designer) else 'no' %}
        <div class="form-group">
            <label for="has_pattern">Using a pattern?</label>
            <select id="has_pattern" name="has_pattern">
                <option value="" disabled hidden>select</option>
                <option value="yes" {% if has_pattern=='yes' %}selected{% endif %}>Yes</option>
                <option value="no" {% if has_pattern=='no' %}selected{% endif %}>No</option>
            </select>
        </div>

        <div id="pattern-details" style="display: {{ 'block' if has_pattern == 'yes' else 'none' }};">
            <div class="form-group">
                <label for="pattern_language">Pattern language:</label>
                <select id="pattern_language" name="pattern_language">
                    <option value="" disabled hidden>select</option>
                    <option value="polish" {% if pattern.pattern_language=='polish' %}selected{% endif %}>polish
                    </option>
                    <option value="english" {% if pattern.pattern_language=='english' %}selected{% endif %}>english
                    </option>
                    <option value="other" {% if pattern.pattern_language=='other' %}selected{% endif %}>other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="designer">Designer:</label>
                <input type="text" id="designer" name="designer" value="{{ pattern.designer or '' }}"
                    placeholder="e.g. Petite Knit">
            </div>
        </div>


        <div class="form-group">
            <label for="yarn_bought">Yarn bought?</label>
            <select id="yarn_bought" name="yarn_bought">
                <option value="" disabled hidden>select</option>
                <option value="yes" {% if pattern.yarn_bought=='yes' %}selected{% endif %}>yes</option>
                <option value="no" {% if pattern.yarn_bought=='no' %}selected{% endif %}>no</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes:</label>
            <input type="text" id="notes" name="notes" value="{{ pattern.notes or '' }}"
                placeholder="Any extra notes...">
        </div>
        <button type="submit" class="btn-submit">
            <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Save changes
        </button>
    </form>
</div>
{% endblock %}
