{% extends 'base.html' %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Your patterns</h2>
        <a href="/patterns/add" class="btn-submit">
            <img src="/static/icons/patterns.png" alt="Patterns" class="button-icon">
            Create pattern
        </a>
    </div>
    {% if patterns %}
    <div class="resource-list">
        {% for pattern in patterns %}
        <a class="resource-card" href="/patterns/{{ pattern.id.value }}">
            <h3>{{ pattern.name }}</h3>
            <p class="resource-card__eyebrow">{{ pattern.category.value }}</p>
        </a>
        {% endfor %}
    </div>
    {% else %}
    <p class="empty-state">No patterns yet. Add your first one!</p>
    {% endif %}
</div>
{% endblock %}
