{% extends 'base.html' %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Your patterns</h2>
        <a href="/patterns/add" class="btn-submit">
            <img src="/static/icons/patterns.png" alt="Patterns"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Create pattern
        </a>
    </div>
    {% for pattern in patterns %}
    <h3><a href="/patterns/{{ pattern.id.value }}">{{ pattern.name }}</a></h3>
    {% endfor %}
</div>
{% endblock %}
