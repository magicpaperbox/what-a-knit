{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2><img src="/static/icons/yarn_ball.png" class="icon-header" alt="Yarn"> Edit skein — {{ yarn.brand }} {{ yarn.name }}</h2>

    <form method="POST" action="/yarn/skeins/{{ skein.id.value }}/edit">
        <div class="form-group">
            <label for="current_weight">Current weight (g):</label>
            <input type="number" id="current_weight" name="current_weight" min="0"
                value="{{ skein.current_weight.grams }}" required>
        </div>

        <button type="submit" class="btn-submit">
            <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Save changes
        </button>
    </form>
</div>
{% endblock %}
