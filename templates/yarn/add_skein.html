{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2><img src="/static/icons/yarn_ball.png" class="icon-header" alt="Yarn"> Add skein — {{ yarn.brand }} {{ yarn.name }}</h2>

    <form method="POST" action="/yarn/{{ yarn.id.value }}/skeins/add">
        <div class="form-group">
            <label for="current_weight">Current weight (g):</label>
            <input type="number" id="current_weight" name="current_weight" min="0" max="{{ yarn.full_weight.grams }}"
                value="{{ yarn.full_weight.grams }}" required>
        </div>

        <button type="submit" class="btn-submit">
            <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Add skein
        </button>
    </form>
</div>
{% endblock %}
