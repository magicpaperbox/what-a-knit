{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2><img src="/static/icons/yarn_ball.png" class="icon-header" alt="Yarn"> Edit yarn</h2>

    {% if error %}
    <div class="error-message">
        {{ error }}
    </div>
    {% endif %}

    {% set y = yarn %}
    {% set f = form %}
    <form method="POST" action="/yarn/{{ y.id.value }}/edit" class="form-shell">
        <div class="form-group">
            <label for="brand">Brand:</label>
            <input type="text" id="brand" name="brand" required
                value="{{ f.brand if f else y.brand }}">
        </div>

        <div class="form-group">
            <label for="name">Yarn name:</label>
            <input type="text" id="name" name="name" required
                value="{{ f.name if f else y.name }}">
        </div>

        <div class="form-group">
            <label for="color_shade">Color / shade:</label>
            <input type="text" id="color_shade" name="color_shade" required
                value="{{ f.color_shade if f else y.color_shade }}">
        </div>

        <div class="form-group">
            <label for="weight_category">Weight category:</label>
            <select id="weight_category" name="weight_category" required>
                <option value="" disabled hidden>select</option>
                {% set selected_cat = f.weight_category if f else y.weight_category.name %}
                {% for cat in weight_categories %}
                <option value="{{ cat.name }}" {% if selected_cat == cat.name %}selected{% endif %}>
                    {{ cat.value }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="full_weight">Full skein weight (g):</label>
            <input type="number" id="full_weight" name="full_weight" min="1" required
                value="{{ f.full_weight if f else y.full_weight.grams }}">
        </div>

        <div class="form-group">
            <label for="full_length">Full skein length (m):</label>
            <input type="number" id="full_length" name="full_length" min="1" step="0.1" required
                value="{{ f.full_length if f else y.full_length.value }}">
        </div>

        <!-- Composition -->
        <div class="form-group">
            <label>Composition:</label>
            <div id="fiber-rows" class="fiber-rows">
                {% if f %}
                    {% for ft in f.getlist('fiber_type[]') %}
                    <div class="fiber-row">
                        <select name="fiber_type[]">
                            <option value="" disabled hidden>fiber type</option>
                            {% for ftype in fiber_types %}
                            <option value="{{ ftype.name }}" {% if ft == ftype.name %}selected{% endif %}>
                                {{ ftype.value }}
                            </option>
                            {% endfor %}
                        </select>
                        <input type="number" name="percentage[]" min="1" max="100" placeholder="%"
                            value="{{ f.getlist('percentage[]')[loop.index0] }}">
                        <button type="button" onclick="this.parentElement.remove()" class="btn-delete btn-delete--small">x</button>
                    </div>
                    {% endfor %}
                {% else %}
                    {% for fiber in y.composition %}
                    <div class="fiber-row">
                        <select name="fiber_type[]">
                            <option value="" disabled hidden>fiber type</option>
                            {% for ftype in fiber_types %}
                            <option value="{{ ftype.name }}" {% if fiber.fiber_type.name == ftype.name %}selected{% endif %}>
                                {{ ftype.value }}
                            </option>
                            {% endfor %}
                        </select>
                        <input type="number" name="percentage[]" min="1" max="100" placeholder="%"
                            value="{{ fiber.percentage }}">
                        <button type="button" onclick="this.parentElement.remove()" class="btn-delete btn-delete--small">x</button>
                    </div>
                    {% endfor %}
                {% endif %}
            </div>
            <button type="button" onclick="addFiberRow()" class="btn-submit btn-submit--small">
                + Add fiber
            </button>
        </div>

        <button type="submit" class="btn-submit">
            <img src="/static/icons/yarn_ball.png" alt="Yarn ball" class="button-icon">
            Save changes
        </button>
    </form>
</div>

<script>
function addFiberRow() {
    const container = document.getElementById('fiber-rows');
    const row = document.createElement('div');
    row.className = 'fiber-row';
    row.innerHTML = `
        <select name="fiber_type[]">
            <option value="" disabled selected hidden>fiber type</option>
            {% for ftype in fiber_types %}
            <option value="{{ ftype.name }}">{{ ftype.value }}</option>
            {% endfor %}
        </select>
        <input type="number" name="percentage[]" min="1" max="100" placeholder="%">
        <button type="button" onclick="this.parentElement.remove()" class="btn-delete btn-delete--small">x</button>
    `;
    container.appendChild(row);
}
</script>
{% endblock %}
