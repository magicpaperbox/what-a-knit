{% extends 'base.html' %}
{% block content %}
    <div class="section">
        <h2>
            <img src="/static/icons/yarn_ball.png" class="icon-header" alt="Yarn">
            {% if mode == "edit" %}Edit yarn{% else %}New yarn{% endif %}
        </h2>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{{ form_action }}" class="form-shell">
            <div class="form-group">
                <label for="brand">Brand:</label>
                <input type="text" id="brand" name="brand" placeholder="e.g. Drops" required
                       value="{{ form_data.brand }}">
            </div>

            <div class="form-group">
                <label for="name">Yarn name:</label>
                <input type="text" id="name" name="name" placeholder="e.g. Alpaca" required
                       value="{{ form_data.name }}">
            </div>

            <div class="form-group">
                <label for="color_shade">Color / shade:</label>
                <input type="text" id="color_shade" name="color_shade" placeholder="e.g. Dusty Pink 3112" required
                       value="{{ form_data.color_shade }}">
            </div>

            <div class="form-group">
                <label for="weight_category">Weight category:</label>
                <select id="weight_category" name="weight_category" required>
                    <option value="" disabled hidden {% if not form_data.weight_category %}selected{% endif %}>select</option>
                    {% for cat in weight_categories %}
                        <option value="{{ cat.name }}"
                                {% if form_data.weight_category == cat.name %}selected{% endif %}>
                            {{ cat.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="full_weight">Full skein weight (g):</label>
                <input type="number" id="full_weight" name="full_weight" min="1" placeholder="e.g. 50" required
                       value="{{ form_data.full_weight }}">
            </div>

            <div class="form-group">
                <label for="full_length">Full skein length (m):</label>
                <input type="number" id="full_length" name="full_length" min="1" step="0.1" placeholder="e.g. 167"
                       required value="{{ form_data.full_length }}">
            </div>

            {% if mode == "add" %}
                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <input type="text" id="notes" name="notes" value="{{ form_data.notes }}">
                </div>
            {% endif %}

            <div class="form-group">
                <label>Composition:</label>
                <div id="fiber-rows" class="fiber-rows">
                    {% for row in form_data.composition_rows %}
                        <div class="fiber-row">
                            <select name="fiber_type[]">
                                <option value="" disabled hidden {% if not row.fiber_type %}selected{% endif %}>fiber type</option>
                                {% for ftype in fiber_types %}
                                    <option value="{{ ftype.name }}" {% if row.fiber_type == ftype.name %}selected{% endif %}>
                                        {{ ftype.value }}
                                    </option>
                                {% endfor %}
                            </select>
                            <input type="number" name="percentage[]" min="1" max="100" placeholder="%"
                                   value="{{ row.percentage }}">
                            <button type="button" onclick="this.parentElement.remove()"
                                    class="btn-delete btn-delete--small">x
                            </button>
                        </div>
                    {% endfor %}
                </div>
                <button type="button" onclick="addFiberRow()" class="btn-submit btn-submit--small">
                    + Add fiber
                </button>
            </div>

            <button type="submit" class="btn-submit">
                <img src="/static/icons/yarn_ball.png" alt="Yarn ball" class="button-icon">
                {% if mode == "edit" %}Save changes{% else %}Add yarn{% endif %}
            </button>
        </form>
    </div>

    <script>
        function addFiberRow() {
            const container = document.getElementById('fiber-rows');
            const row = document.createElement('div');
            row.className = 'fiber-row';
            row.innerHTML = `
        <select name="fiber_type[]">
            <option value="" disabled selected hidden>fiber type</option>
            {% for ftype in fiber_types %}
            <option value="{{ ftype.name }}">{{ ftype.value }}</option>
            {% endfor %}
        </select>
        <input type="number" name="percentage[]" min="1" max="100" placeholder="%">
        <button type="button" onclick="this.parentElement.remove()" class="btn-delete btn-delete--small">x</button>
    `;
            container.appendChild(row);
        }
    </script>
{% endblock %}
