{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2>Your yarn</h2>
    <a href="/yarn/add" class="btn-submit" style="display: inline-block; margin-bottom: 20px;">
        <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
            style="width: 24px; vertical-align: middle; margin-right: 8px;">
        Add yarn
    </a>
    {% for yarn in yarns %}
    <h3>
        <a href="/yarn/{{ yarn.id.value }}">{{ yarn.brand }} — {{ yarn.name }} — {{ yarn.color_shade }}</a>
    </h3>
    {% endfor %}
    {% if not yarns %}
    <p>No yarn yet. Add your first one!</p>
    {% endif %}
</div>
{% endblock %}
