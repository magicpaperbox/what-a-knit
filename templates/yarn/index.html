{% extends 'base.html' %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Your yarn</h2>
        <a href="/yarn/add" class="btn-submit">
            <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Add yarn
        </a>
    </div>
    {% for yarn in yarns %}
    <h3>
        <a href="/yarn/{{ yarn.id.value }}">{{ yarn.brand }} — {{ yarn.name }} — {{ yarn.color_shade }}</a>
    </h3>
    {% endfor %}
    {% if not yarns %}
    <p>No yarn yet. Add your first one!</p>
    {% endif %}
</div>
{% endblock %}
