<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}What a knit!{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/icons/yarn_ball.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <h1>What a knit!</h1>
    <nav>
        <a href="/"><img src="/static/icons/projects.png" class="icon" alt="projects"> Your projects</a>
        <a href="/add"><img src="/static/icons/yarn_ball.png" class="icon" alt="create"> Create project</a>
        <button class="theme-toggle" onclick="toggleTheme()">
            <img src="/static/icons/moon.png" class="icon icon-light" alt="dark mode">
            <img src="/static/icons/sun.png" class="icon icon-dark" alt="light mode">
            <span class="toggle-text">Dark mode</span>
        </button>
    </nav>
    {% block content %}
    {% endblock %}
    <footer
        style="margin-top: 40px; text-align: center; color: #9b84b8; font-family: LaBelleAurore, sans-serif; font-size: 14px;">
        <p>@magicpaperbox 2026 <img src="/static/icons/yarn_ball.png" class="icon-footer" alt="yarn"></p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>

</html>
