{% extends 'base.html' %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Your projects</h2>
        <a href="/projects/add" class="btn-submit">
            <img src="/static/icons/projects.png" alt="Projects"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Create project
        </a>
    </div>
    {% for project in projects %}
    <h3><a href="/projects/{{ project.id.value }}">{{ project.name }}</a></h3>
    {% endfor %}
</div>
{% endblock %}
