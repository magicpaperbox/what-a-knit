{% extends 'base.html' %}
{% block content %}
    <div class="section">
        <h2><img src="/static/icons/needles.png" class="icon-header" alt="Needle"> New project</h2>
        <form method="POST" action="/projects/add" class="project-form project-form--narrow form-shell">

            <div class="form-group">
                <label for="name">Project name:</label>
                <input type="text" id="name" name="name" placeholder="project name" required>
            </div>

            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    <option value="" disabled selected hidden>select</option>
                    {% for current_status in status %}
                        <option value="{{ current_status.name }}">
                            {{ current_status.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="patterns-search">Patterns used:</label>
                <input type="text" id="patterns-search" placeholder="Search">

                <div id="pattern-search-results"></div>

                <div id="selected-patterns-label">
                    <strong>Selected patterns:</strong>
                    <div id="selected-patterns"></div>
                </div>

                <div id="pattern-hidden-inputs"></div>
            </div>

            <script id="patterns-data" type="application/json">
                {{ patterns_dicts | tojson }}

            </script>

            <div class="form-group">
                <label for="progress_percent">Progress percent:</label>
                <div class="number-stepper">
                    <input type="number" id="progress_percent" name="progress_percent" min="0" max="100" step="1">
                    <div class="number-stepper-controls">
                        <button type="button" class="number-stepper-button" data-stepper-action="decrement"
                                aria-label="Decrease progress percent">-
                        </button>
                        <button type="button" class="number-stepper-button" data-stepper-action="increment"
                                aria-label="Increase progress percent">+
                        </button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="gauge_stitches">Gauge stitches:</label>
                <div class="number-stepper">
                    <input type="number" id="gauge_stitches" name="gauge_stitches" min="0" max="100" step="0.5"
                           placeholder="stitches in 10 cm">
                    <div class="number-stepper-controls">
                        <button type="button" class="number-stepper-button" data-stepper-action="decrement"
                                aria-label="Decrease gauge stitches">-
                        </button>
                        <button type="button" class="number-stepper-button" data-stepper-action="increment"
                                aria-label="Increase gauge stitches">+
                        </button>
                    </div>
                </div>
                <label for="gauge_rows">Gauge rows:</label>
                <div class="number-stepper">
                    <input type="number" id="gauge_rows" name="gauge_rows" min="0" max="100" step="0.5"
                           placeholder="rows in 10 cm">
                    <div class="number-stepper-controls">
                        <button type="button" class="number-stepper-button" data-stepper-action="decrement"
                                aria-label="Decrease gauge rows">-
                        </button>
                        <button type="button" class="number-stepper-button" data-stepper-action="increment"
                                aria-label="Increase gauge rows">+
                        </button>
                    </div>
                </div>
            </div>


            <div class="form-group">
                <label for="notes">Notes:</label>
                <input type="text" id="notes" name="notes" placeholder="Any extra notes...">
            </div>

            <div class="form-group">
                <label for="start_date">Start date:</label>
                <input type="date" id="start_date" name="start_date">
            </div>

            <div class="form-group">
                <label for="end_date">End date:</label>
                <input type="date" id="end_date" name="end_date">
            </div>

            <button type="submit" class="btn-submit">
                <img src="/static/icons/yarn_ball.png" alt="Yarn ball" class="button-icon">
                Add project
            </button>
        </form>
    </div>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script src="/static/js/number-stepper.js"></script>
    <script src="/static/js/project-pattern-search.js"></script>
{% endblock %}
