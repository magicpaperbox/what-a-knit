{% extends 'base.html' %}
{% block content %}
<div class="section">
    <h2><img src="/static/icons/needles.png" class="icon-header" alt="Needle"> Edit project</h2>

    <form method="POST" action="/projects/{{ project.id.value }}/edit">

        <div class="form-group">
            <label for="name">Project name:</label>
            <input type="text" id="name" name="name" value="{{ project.name }}" required>
        </div>

        <div class="form-group">
            <label for="my_tool_size">My tool size:</label>
            <input type="text" id="my_tool_size" name="my_tool_size" value="{{ project.my_tool_size or '' }}"
                placeholder="e.g. 4.0 mm">
        </div>

        <div class="form-group">
            <label for="my_gauge">My gauge:</label>
            <input type="text" id="my_gauge" name="my_gauge" value="{{ project.my_gauge or '' }}"
                placeholder="e.g. 22 sts x 30 rows">
        </div>

        <div class="form-group">
            <label for="yarn_bought">Yarn bought?</label>
            <select id="yarn_bought" name="yarn_bought">
                <option value="" disabled hidden>select</option>
                <option value="yes" {% if project.yarn_bought=='yes' %}selected{% endif %}>yes</option>
                <option value="no" {% if project.yarn_bought=='no' %}selected{% endif %}>no</option>
            </select>
        </div>

        <div class="form-group">
            <label for="notes">Notes:</label>
            <input type="text" id="notes" name="notes" value="{{ project.notes or '' }}"
                placeholder="Any extra notes...">
        </div>

        <button type="submit" class="btn-submit">
            <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
                style="width: 24px; vertical-align: middle; margin-right: 8px;">
            Save changes
        </button>
    </form>
</div>
{% endblock %}
