{% extends 'base.html' %}
{% block content %}
    <div class="section">
        <h2><img src="/static/icons/needles.png" class="icon-header" alt="Needle"> Edit project</h2>

        <form method="POST" action="/projects/{{ project.id.value }}/edit">

            <div class="form-group">
                <label for="name">Project name:</label>
                <input type="text" id="name" name="name" value="{{ project.name }}" required>
            </div>

            <div class="form-group">
                <label for="status">Status:</label>
                <select id="status" name="status" required>
                    {% for current_status in status %}
                        <option value="{{ current_status.name }}"
                                {% if current_status == project.status %} selected {% endif %}>
                            {{ current_status.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="patterns-search">Patterns used:</label>
                <input type="text" id="patterns-search" placeholder="Search">

                <div id="pattern-search-results"></div>

                <div id="selected-patterns-label">
                    <strong>Selected patterns:</strong>
                    <div id="selected-patterns"></div>
                </div>

                <div id="pattern-hidden-inputs"></div>
            </div>

            <script id="patterns-data" type="application/json">
                {{ patterns_dicts | tojson }}
            </script>

            <div class="form-group">
                <label for="progress_percent">Progress percent:</label>
                <div class="number-stepper">
                    <input type="number" id="progress_percent" name="progress_percent" min="0" max="100" step="1"
                           value="{{ project.progress_percent if project.progress_percent is not none else '' }}">
                    <div class="number-stepper-controls">
                        <button type="button" class="number-stepper-button" data-stepper-action="decrement" aria-label="Decrease progress percent">-</button>
                        <button type="button" class="number-stepper-button" data-stepper-action="increment" aria-label="Increase progress percent">+</button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="gauge_stitches">Gauge stitches:</label>

                <div class="number-stepper">
                    <input
                            value="{{ project.actual_gauge.stitches if project.actual_gauge else '' }}"
                            type="number"
                            id="gauge_stitches"
                            name="gauge_stitches"
                            min="0"
                            max="100"
                            step="0.5"
                            placeholder="stitches in 10 cm">
                    <div class="number-stepper-controls">
                        <button type="button" class="number-stepper-button" data-stepper-action="decrement" aria-label="Decrease gauge stitches">-</button>
                        <button type="button" class="number-stepper-button" data-stepper-action="increment" aria-label="Increase gauge stitches">+</button>
                    </div>
                </div>
                <label for="gauge_rows">Gauge rows:</label>
                <div class="number-stepper">
                    <input
                            value="{{ project.actual_gauge.rows if project.actual_gauge else '' }}"
                            type="number"
                            id="gauge_rows"
                            name="gauge_rows"
                            min="0"
                            max="100"
                            step="0.5"
                            placeholder="rows in 10 cm">
                    <div class="number-stepper-controls">
                        <button type="button" class="number-stepper-button" data-stepper-action="decrement" aria-label="Decrease gauge rows">-</button>
                        <button type="button" class="number-stepper-button" data-stepper-action="increment" aria-label="Increase gauge rows">+</button>
                    </div>
                </div>
            </div>


            <div class="form-group">
                <label for="start_date">Start date:</label>
                <input type="date" id="start_date" name="start_date" value="{{ project.start_date or '' }}">
            </div>

            <div class="form-group">
                <label for="end_date">End date:</label>
                <input type="date" id="end_date" name="end_date" value="{{ project.end_date or '' }}">
            </div>

            <div class="form-group">
                <label for="notes">Notes:</label>
                <input type="text" id="notes" name="notes" value="{{ project.notes or '' }}"
                       placeholder="Any extra notes...">
            </div>

            <button type="submit" class="btn-submit">
                <img src="/static/icons/yarn_ball.png" alt="Yarn ball"
                     style="width: 24px; vertical-align: middle; margin-right: 8px;">
                Save changes
            </button>
        </form>
    </div>
{% endblock %}
{% block scripts %}
    {{ super() }}
    <script src="/static/js/number-stepper.js"></script>
    <script src="/static/js/project-pattern-search.js"></script>
{% endblock %}
