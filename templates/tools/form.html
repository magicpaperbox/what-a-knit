{% extends 'base.html' %}
{% block content %}
    <div class="section">
        <h2>
            <img src="/static/icons/needles.png" class="icon-header" alt="Needles">
            {% if mode == "edit" %}Edit tool{% else %}New tool{% endif %}
        </h2>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{{ form_action }}" class="form-shell">

            <div class="form-group">
                <label for="kind">Tool type:</label>
                <select id="kind" name="kind" required>
                    <option value="" disabled hidden {% if not form_data.kind %}selected{% endif %}>select</option>
                    {% for kind in tool_kinds %}
                        <option value="{{ kind.name }}"
                                {% if form_data.kind == kind.name %}selected{% endif %}>
                            {{ kind.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group" id="size-field">
                <label for="size">Size (mm):</label>
                <input type="number" id="size" name="size" min="0.5" step="0.25" placeholder="e.g. 4.0"
                       value="{{ form_data.size }}">
            </div>

            <div class="form-group" id="length-field">
                <label for="length">Length (cm):</label>
                <input type="number" id="length" name="length" min="1" step="0.5" placeholder="e.g. 80"
                       value="{{ form_data.length }}">
            </div>


            <div class="form-group">
                <label for="material">Material:</label>
                <select id="material" name="material" required>
                    <option value="" disabled hidden {% if not form_data.material %}selected{% endif %}>select</option>
                    {% for material in materials %}
                        <option value="{{ material.name }}"
                                {% if form_data.material == material.name %}selected{% endif %}>
                            {{ material.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-submit">
                <img src="/static/icons/needles.png" alt="Needles" class="button-icon">
                {% if mode == "edit" %}Save changes{% else %}Add tool{% endif %}
            </button>
        </form>
    </div>

    <script>
        const kindsWithSize = new Set({{ tool_kinds_with_size | tojson }});
        const kindsWithLength = new Set({{ tool_kinds_with_length | tojson }});

        const kindSelect = document.getElementById("kind");

        const sizeField = document.getElementById("size-field");
        const sizeInput = document.getElementById("size");

        const lengthField = document.getElementById("length-field");
        const lengthInput = document.getElementById("length");

        function updateMeasurementFields() {
            const selectedKind = kindSelect.value;
            updateField(sizeField, sizeInput, kindsWithSize.has(selectedKind));
            updateField(lengthField, lengthInput, kindsWithLength.has(selectedKind));
        }

        function updateField(field, input, shouldShow) {
            field.hidden = !shouldShow;
            input.required = shouldShow;

            if (!shouldShow) {
                input.value = "";
            }
        }

        kindSelect.addEventListener("change", updateMeasurementFields);
        updateMeasurementFields();
    </script>

{% endblock %}
