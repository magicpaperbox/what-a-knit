{% extends 'base.html' %}
{% block content %}
    <div class="section">
        <h2><img src="/static/icons/needles.png" class="icon-header" alt="Needles"> New tool</h2>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/tools/add" class="form-shell">

            <div class="form-group">
                <label for="type">Tool type:</label>
                <select id="type" name="type" required>
                    <option value="" disabled selected hidden>select</option>
                    {% for cat in tool_categories %}
                        <option value="{{ cat.name }}"
                                {% if form and form.tool_category == cat.name %}selected{% endif %}>
                            {{ cat.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group">
                <label for="size_mm">Size (mm):</label>
                <input type="number" id="size_mm" name="size_mm"
                       value="{{ form.size_mm if form else '' }}">
            </div>

            <div class="form-group">
                <label for="length">Length (cm):</label>
                <input type="number" id="length" name="length" min="1" step="0.5" placeholder="e.g. 167" required
                       value="{{ form.length if form else '' }}">
            </div>


            <div class="form-group">
                <label for="material">Material:</label>
                <select id="material" name="material" required>
                    <option value="" disabled selected hidden>select</option>
                    {% for material in materials %}
                        <option value="{{ material.name }}"
                                {% if form and form.material == material.name %}selected{% endif %}>
                            {{ material.value }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn-submit">
                <img src="/static/icons/needles.png" alt="Needles" class="button-icon">
                Add tool
            </button>
        </form>
    </div>

{% endblock %}
